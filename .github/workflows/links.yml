name: Link check

on:
  schedule:
    - cron: "30 7 * * 1" # Mondays 07:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    name: check links in docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # to open/update the broken-links issue
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # Markdown across the repo; node_modules and other gitignored paths are
          # skipped automatically. Tune ignored URLs in .lycheeignore.
          args: >-
            --no-progress --cache --max-cache-age 1d
            './**/*.md'
          fail: false # don't fail the run; we report via an issue instead
      - name: Open an issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6
        with:
          title: Broken links found by lychee
          content-filepath: ./lychee/out.md
          labels: documentation, broken-link
