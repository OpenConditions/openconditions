name: Release

# Activates on a semver tag (e.g. `v0.2.0`). Prerequisites the maintainer sets once:
#   - the `@openconditions` npm scope registered + an `NPM_TOKEN` repo secret (for the package publish job);
#   - GHCR is reached with the built-in GITHUB_TOKEN (no extra secret).
# Until a tag is pushed this workflow does nothing; CI (ci.yml) is unaffected.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish-packages:
    name: publish @openconditions/{core,roads} to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Publish (prebuilt dist, public scope)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping npm publish (images + integration artifact still publish)."
            exit 0
          fi
          pnpm --filter "@openconditions/core" --filter "@openconditions/roads" publish --access public --no-git-checks

  publish-image:
    name: build + push ghcr.io/openconditions/ingest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v5
        with:
          images: ghcr.io/openconditions/ingest
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6
        with:
          context: .
          file: services/ingest/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-openlr-image:
    name: build + push ghcr.io/openconditions/openlr-resolver
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v5
        with:
          images: ghcr.io/openconditions/openlr-resolver
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # Context is the service dir — the resolver Dockerfile only needs its own
      # app/, scripts/ and requirements.txt (no workspace), unlike the ingest.
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6
        with:
          context: services/openlr-resolver
          file: services/openlr-resolver/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-integration:
    name: publish road-conditions-openconditions artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build the integration backend bundle
        run: pnpm --filter "@openconditions/road-conditions-openconditions..." build

      # The OpenMapX installer wants manifest.json at the tar root + the prebuilt
      # dist/backend/index.mjs and no node_modules; the sha256 is over the tarball.
      - name: Package the artifact
        id: pack
        run: |
          dir=integrations/road-conditions-openconditions
          out=road-conditions-openconditions.tar.gz
          tar -czf "$out" -C "$dir" manifest.json dist/backend/index.mjs LICENSE
          sha=$(sha256sum "$out" | cut -d' ' -f1)
          echo "$sha" > "$out.sha256"
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "Artifact sha256: $sha"

      # Emit the extension.json for THIS tag (version + service ref pinned to it)
      # from the committed template. The OpenMapX catalog points `manifest` at
      # this release's `…/releases/latest/download/extension.json`, so a new tag
      # surfaces as an available update with no catalog edit.
      - name: Generate the release extension.json
        run: |
          ver="${GITHUB_REF_NAME#v}"
          # Pin the integration component to THIS release's tarball + its sha256
          # (the committed template carries the unpinned `…/latest/…` URL). The
          # OpenMapX installer fetches this https .tar.gz, verifies the sha, and
          # extracts it into custom_integrations — so `ext update` refreshes the
          # provider integration, not just the ingest service.
          artifact="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/road-conditions-openconditions.tar.gz"
          mkdir -p build
          jq --arg v "$ver" --arg ref "$GITHUB_REF_NAME" \
            --arg art "$artifact" --arg sha "${{ steps.pack.outputs.sha256 }}" \
            '.version = $v
             | .services |= map(.ref = $ref)
             | .integrations = [{ id: "road-conditions-openconditions", artifact: $art, sha256: $sha }]' \
            extension.json > build/extension.json
          echo "extension.json for $ver (service ref $GITHUB_REF_NAME):"
          cat build/extension.json

      - name: Attach to the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --verify-tag \
            --title "${{ github.ref_name }}" \
            --notes "OpenConditions ${{ github.ref_name }} — road-conditions-openconditions artifact sha256: ${{ steps.pack.outputs.sha256 }}" \
            || echo "release already exists"
          gh release upload "${{ github.ref_name }}" \
            road-conditions-openconditions.tar.gz road-conditions-openconditions.tar.gz.sha256 \
            build/extension.json --clobber
