name: Release

# Activates on a semver tag (e.g. `v0.2.0`). Prerequisites the maintainer sets once:
#   - the `@openconditions` npm scope registered + an `NPM_TOKEN` repo secret (for the package publish job);
#   - GHCR is reached with the built-in GITHUB_TOKEN (no extra secret).
# Until a tag is pushed this workflow does nothing; CI (ci.yml) is unaffected.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish-packages:
    name: publish @openconditions/{core,roads} to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Publish (prebuilt dist, public scope)
        run: pnpm --filter "@openconditions/core" --filter "@openconditions/roads" publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-image:
    name: build + push ghcr.io/openconditions/ingest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v5
        with:
          images: ghcr.io/openconditions/ingest
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6
        with:
          context: .
          file: services/ingest/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-openlr-image:
    name: build + push ghcr.io/openconditions/openlr-resolver
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v5
        with:
          images: ghcr.io/openconditions/openlr-resolver
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # Context is the service dir — the resolver Dockerfile only needs its own
      # app/, scripts/ and requirements.txt (no workspace), unlike the ingest.
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6
        with:
          context: services/openlr-resolver
          file: services/openlr-resolver/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
