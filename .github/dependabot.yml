version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    labels: [dependencies]
    commit-message:
      prefix: chore
      include: scope
    groups:
      eslint-and-formatters:
        patterns:
          - "eslint*"
          - "prettier*"
      typescript-toolchain:
        patterns:
          - "typescript"
          - "@types/*"
          - "tsx"
          - "tsup"
      turbo:
        patterns:
          - "turbo"
      test-toolchain:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "testcontainers"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: ci
    ignore:
      # Pinned fork that provides the Node 24 runtime; the upstream 2.6.1 tag
      # regresses the runtime, so update this action by hand, not via Dependabot.
      - dependency-name: "OpenMapX/cla-assistant-action"

  - package-ecosystem: pip
    directory: "/services/openlr-resolver"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    commit-message:
      prefix: chore
      include: scope
    groups:
      # The dormant resolver's deps arrive as one PR instead of one-per-package.
      python-deps:
        patterns:
          - "*"

  - package-ecosystem: docker
    # Cover every Dockerfile so the digest-pinned base images get bumped (a
    # frozen digest only stays secure if something keeps it current).
    directories:
      - "/services/ingest"
      - "/services/openlr-resolver"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels: [dependencies, docker]
    commit-message:
      prefix: chore
      include: scope
    ignore:
      # Stay on the pinned LTS base images (Node 24 / Python 3.12 == CI); bump a
      # base-image major deliberately, not via Dependabot.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "python"
        # Python 3.12→3.14 is a "minor" bump in semver terms; ignore minor too so
        # the base stays on 3.12 (== the CI test runtime) until bumped on purpose.
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
